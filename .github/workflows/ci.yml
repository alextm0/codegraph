name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      neo4j:
        image: neo4j:5.25.1-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/test_password
          NEO4J_PLUGINS: '["graph-data-science"]'
          NEO4J_dbms_security_procedures_unrestricted: "gds.*"
          NEO4J_dbms_security_procedures_allowlist: "gds.*"
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Neo4j + GDS to be ready
        run: |
          echo "Waiting for Neo4j GDS plugin to finish loading..."
          for i in $(seq 1 30); do
            if curl -sf \
                 -u neo4j:test_password \
                 -H "Content-Type: application/json" \
                 -d '{"statements":[{"statement":"CALL gds.version() YIELD version RETURN version"}]}' \
                 http://localhost:7474/db/neo4j/tx/commit 2>/dev/null \
                 | grep -q '"errors":\[\]'; then
              echo "Neo4j + GDS is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 5s..."
            sleep 5
          done
          echo "ERROR: Timed out waiting for Neo4j + GDS after 150s"
          exit 1

      - name: Run tests
        env:
          NEO4J_URI: neo4j://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: test_password
        run: |
          python -m pytest tests/ -v
