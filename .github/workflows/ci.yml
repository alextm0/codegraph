name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      neo4j:
        image: neo4j:5.25.1-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/test_password
          NEO4J_PLUGINS: '["graph-data-science"]'
          NEO4J_dbms_security_procedures_unrestricted: "gds.*"
          NEO4J_dbms_security_procedures_allowlist: "gds.*"
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 60s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Neo4j + GDS to be ready
        run: |
          echo "Waiting for Neo4j to be fully ready..."
          # Use the installed python packages to check readiness
          python -c '
          import time
          from neo4j import GraphDatabase
          uri = "neo4j://localhost:7687"
          user = "neo4j"
          password = "test_password"
          for i in range(1, 31):
              try:
                  with GraphDatabase.driver(uri, auth=(user, password)) as driver:
                      with driver.session() as session:
                          result = session.run("CALL gds.version() YIELD version RETURN version")
                          version = result.single()["version"]
                          print(f"Neo4j + GDS {version} is ready!")
                          exit(0)
              except Exception as e:
                  print(f"Attempt {i}/30 — waiting 5s... ({e})")
                  time.sleep(5)
          print("Timed out waiting for Neo4j + GDS")
          exit(1)
          '

      - name: Run tests
        env:
          NEO4J_URI: neo4j://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: test_password
        run: |
          python -m pytest tests/ -v
